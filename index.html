<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Residents Directory</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="topbar">
    <div class="topbar-main">
      <div class="brand">Residents Directory</div>

      <input id="search" class="search" type="search" placeholder="Search residents…" autocomplete="off" aria-label="Search residents" />
    </div>

    <div id="status" class="status" role="status" aria-live="polite">
      <span id="statusText" class="status-text"></span>
      <span id="dataUpdated" class="updated-note hidden"></span>
    </div>

    <div class="topbar-actions">
      <button id="installBtn" class="install-button" type="button">
        Add to Home Screen
      </button>
      <span id="connectionStatus" class="connection-status hidden" role="status" aria-live="polite"></span>
    </div>
  </header>

  <main class="container">
    <ul id="list" class="list" aria-label="Residents"></ul>
  </main>

  <dialog id="modal" class="modal" aria-labelledby="modalTitle" aria-describedby="modalSub">
    <div class="modal-inner">
      <button id="closeBtn" class="icon-btn" aria-label="Close">✕</button>
      <img id="modalPhoto" class="modal-photo" alt="" />
      <div id="modalTitle" class="modal-title"></div>
      <div id="modalSub" class="modal-sub"></div>
      <div class="modal-actions">
        <a id="textBtn" class="btn" href="#">Text</a>
        <a id="callBtn" class="btn" href="#">Call</a>
        <a id="emailBtn" class="btn" href="#">Email</a>
      </div>
      <div id="modalMeta" class="modal-meta"></div>
    </div>
  </dialog>

  <div id="updateNotice" class="update-notice hidden" role="status" aria-live="polite">
    <span>New version ready</span>
    <button id="reloadAppBtn" type="button">Reload</button>
  </div>

  <button id="backToTopBtn" class="back-to-top hidden" type="button" aria-label="Back to top" title="Back to top">
    <span aria-hidden="true">&uarr;</span>
  </button>

  <script src="app.js"></script>
</body>
</html>
