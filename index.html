<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Residents Directory</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">Residents Directory</div>

    <input id="search" class="search" type="search" placeholder="Search residents…" autocomplete="off" />

    <select id="sort" class="search" aria-label="Sort">
      <option value="default">Sort: Default (ResidentID)</option>
      <option value="address">Sort: Address Number</option>
      <option value="full_name">Sort: Full Name</option>
    </select>
  </header>

  <main class="container">
    <div id="status" class="status"></div>
    <ul id="list" class="list"></ul>
  </main>

  <dialog id="modal" class="modal">
    <div class="modal-inner">
      <button id="closeBtn" class="icon-btn" aria-label="Close">✕</button>
      <img id="modalPhoto" class="modal-photo" alt="" />
      <div id="modalTitle" class="modal-title"></div>
      <div id="modalSub" class="modal-sub"></div>
      <div class="modal-actions">
        <a id="callBtn" class="btn" href="#">Call</a>
        <a id="emailBtn" class="btn" href="#">Email</a>
      </div>
      <div id="modalMeta" class="modal-meta"></div>
    </div>
  </dialog>

  <script src="app.js"></script>
  <!-- refresh trigger -->
</body>
</html>
<!-- refresh trigger -->
